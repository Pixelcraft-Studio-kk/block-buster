name: Game Quality Check

# Where you use it: Triggering on code changes
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Find an existing action in the Marketplace to "Checkout" your code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Basic script to check if index.html exists (Simple Validation)
      - name: Verify Core Files
        run: |
          if [ -f "index.html" ]; then
            echo "✅ index.html found. Ready for launch!"
          else
            echo "❌ index.html is missing! Game will not load."
            exit 1
          fi

      - name: Lint Code Base
        uses: super-linter/super-linter@v5
        env:
          VALIDATE_ALL_CODEBASE: true # Only check changed files
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # We can specifically turn on what we want to demo:
          VALIDATE_HTML: true
          VALIDATE_JAVASCRIPT_ES: true
          VALIDATE_CSS: true
